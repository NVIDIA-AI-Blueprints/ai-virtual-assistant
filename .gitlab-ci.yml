# Generated by bp-onboard-bcs skill (Phase 2).
# Hands off pipeline assembly to the Blueprint Factory.
variables:
  PIPELINE_NAME: bcs-nim-migration-sanity
  BPF_RUNNER_IMAGE_TAG: "0.0.0.dev234078784"
  DEVELOP_MODE: "false"
  RUN_CLEANUP_RESOURCES: "true"
  NAMESPACE: "ai-virtual-assistant"
  CHART_RELEASE_NAME: "ai-virtual-assistant"

workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
    - if: $CI_COMMIT_BRANCH

default:
  cache:
    paths:
      - .cache/pip

include:
  - project: "nim-blueprints/nim-blueprint-benchmarking/blueprint-pipeline"
    ref: "BlueprintFactory_v1.1.0"
    file: "assembler/assembler.yml"
